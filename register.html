{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="card auth-card">
    <div class="auth-badge accent">Join the community</div>
    <h2>Create an Account</h2>
    <p class="muted">Register to submit help requests, share feedback, and stay connected with the community.</p>
    <form method="post">
      <input type="text" name="username" placeholder="Username" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>
      <button type="submit" class="btn btn-secondary">Sign Up</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Sign in</a>.</p>
  </div>
</div>
{% endblock %}
